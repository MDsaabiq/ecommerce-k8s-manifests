apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: default
type: Opaque
stringData:
  # Replace with your real values before applying
  # Never commit real secrets — this file is a template
  MONGODB_URI: "your-mongodb-atlas-uri"
  JWT_SECRET: "your-jwt-secret"
  CLOUDINARY_API_KEY: "your-cloudinary-api-key"
  CLOUDINARY_API_SECRET: "your-cloudinary-api-secret"
